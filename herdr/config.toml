# herdr configuration
# Symlinked to ~/.config/herdr/config.toml by home.nix.
# Full default reference: `herdr --default-config`

[keys]
# Prefix stays the default (ctrl+b). Only the tab/workspace bindings below
# are overridden, using bracket keys to cycle and "w"/"t" to mean
# workspace/tab respectively. Shift = "workspace" version of the tab command.
new_tab = "prefix+t"              # was prefix+c
previous_tab = "prefix+["         # was prefix+p
next_tab = "prefix+]"             # was prefix+n

new_workspace = "prefix+shift+w"  # was prefix+shift+n
previous_workspace = "prefix+{"   # unbound by default; shift+[ types "{", not shift+[
next_workspace = "prefix+}"       # unbound by default; shift+] types "}", not shift+]

# Moved to make room for new_workspace above (default rename_workspace was
# prefix+shift+w, which now means "new workspace").
rename_workspace = "prefix+shift+n"
